name: Build Mod

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build Android64
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository using Node 24 compatible action
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Run Geode SDK build tool
      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          sdk: latest
          target: Android64
          build-config: Release

      # Step 3: Securely upload your .geode binary via Node 24 optimized pipeline
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dm.ai-deco-assistant
          path: ${{ steps.build.outputs.build-output }}
          if-no-files-found: error
