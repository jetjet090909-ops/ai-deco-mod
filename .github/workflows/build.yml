name: Build Mod

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Android64
          target: aarch64-linux-android
          extra: -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a

    name: Build ${{ matrix.config.name }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Force Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Geode CLI
      uses: geode-sdk/actions/setup@main
      with:
        build-config: ${{ matrix.config.extra }}

    - name: Build Geode Mod
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.config.extra }}
        cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dm.ai-deco-assistant
        path: build/*.geode
